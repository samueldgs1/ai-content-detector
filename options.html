<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AIRadar Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8f0; display: flex; justify-content: center; padding: 48px 16px; }
    .card { background: #1e1e2e; border: 1px solid #3a3a5c; border-radius: 16px; padding: 32px; width: 100%; max-width: 500px; }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 24px; background: linear-gradient(90deg, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .section-title { font-size: 11px; font-weight: 700; color: #6666aa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    label { display: block; font-size: 13px; color: #9999cc; margin-bottom: 6px; }
    input[type="text"], input[type="password"], textarea {
      width: 100%; background: #0f0f13; border: 1px solid #3a3a5c; border-radius: 8px;
      color: #e8e8f0; padding: 10px 12px; font-size: 13px; outline: none; margin-bottom: 16px; font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #a78bfa; }
    textarea { height: 90px; resize: vertical; }
    button { background: linear-gradient(135deg, #7c3aed, #ec4899); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
    button:hover { opacity: 0.9; }
    .status { font-size: 13px; color: #4ade80; margin-top: 8px; }
    hr { border-color: #2a2a3e; margin: 20px 0; }
    a { color: #a78bfa; }
    .hint { font-size: 11px; color: #6666aa; margin-top: -12px; margin-bottom: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📡 AIRadar Settings</h1>

    <div class="section-title">API Key (Optional — Deeper Analysis)</div>
    <label>Anthropic API Key</label>
    <input type="password" id="api-key" placeholder="sk-ant-..."/>
    <p class="hint">When set, uses Claude to double-check uncertain content. Get one free at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>

    <hr/>

    <div class="section-title">Whitelist — Never scan these sites</div>
    <label>Domains (one per line)</label>
    <textarea id="whitelist" placeholder="mysite.com&#10;trusted-blog.org"></textarea>

    <hr/>

    <div class="section-title">Custom AI Phrases</div>
    <label>Add your own AI giveaway phrases (one per line)</label>
    <textarea id="custom-phrases" placeholder="in conclusion&#10;it's worth noting"></textarea>

    <button id="save-btn">Save Settings</button>
    <p class="status" id="status"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
